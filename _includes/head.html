<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Begin SEO -->
  {% seo %}
  <!-- End SEO -->

  <!-- Begin Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <!-- End Favicon -->

  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link rel="stylesheet" type="text/css" href="/assets/css/syntax.css">
  <link rel="stylesheet" type="text/css" href="/assets/css/override.css">

  {% feed_meta %}

  {% if jekyll.environment == 'production' and site.google_analytics -%}
  <!-- Begin Google Analytics -->
  {% include google-analytics.html %}
  <!-- End Google Analytics -->
  {%- endif %}

  {% if jekyll.environment == 'production' -%}
  <!-- dark theme using DarkReader -->
  <script src="https://unpkg.com/darkreader@4.9.82/darkreader.js"></script>
  <script type="text/javascript">
    // Guard against the CDN being blocked, slow, or unreachable so the
    // page never throws "DarkReader is not defined".
    if (typeof DarkReader !== 'undefined') {
      DarkReader.setFetchMethod(window.fetch); // avoid CORS errors in console
      //DarkReader.enable();
      DarkReader.auto({ brightness: 100, contrast: 90, sepia: 10 });
    } else {
      console.warn('DarkReader did not load from the CDN; skipping dark mode.');
    }
  </script>
  {%- endif %}
  
</head>
